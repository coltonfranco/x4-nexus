openapi: 3.1.0
info:
  title: x4-api
  version: 0.0.1
paths:
  /api/v1/health:
    get:
      tags:
      - health
      summary: Health
      operationId: health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/setup/status:
    get:
      tags:
      - setup
      summary: Setup Status
      operationId: setup_status_api_v1_setup_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatus'
  /api/v1/setup/validate-path:
    post:
      tags:
      - setup
      summary: Validate Path
      operationId: validate_path_api_v1_setup_validate_path_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidatePathRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PathValidation'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/setup/config:
    post:
      tags:
      - setup
      summary: Set Config
      description: Persist folder choices and apply them to the live settings immediately.
      operationId: set_config_api_v1_setup_config_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupConfigRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatus'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/setup/initialize:
    post:
      tags:
      - setup
      summary: Initialize
      description: Start the static build in the background. Idempotent while one
        is running.
      operationId: initialize_api_v1_setup_initialize_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatus'
  /api/v1/wares:
    get:
      tags:
      - wares
      summary: List Wares
      operationId: list_wares_api_v1_wares_get
      parameters:
      - name: group
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Group
      - name: transport
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Transport
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filter by computed bucket: commodity, equipment, inventory,
            module, ship'
          title: Category
        description: 'Filter by computed bucket: commodity, equipment, inventory,
          module, ship'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WareSummary'
                title: Response List Wares Api V1 Wares Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wares/{ware_id}:
    get:
      tags:
      - wares
      summary: Get Ware
      operationId: get_ware_api_v1_wares__ware_id__get
      parameters:
      - name: ware_id
        in: path
        required: true
        schema:
          type: string
          title: Ware Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WareDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/equipment:
    get:
      tags:
      - equipment
      summary: List Equipment
      description: 'Every buyable ship part with its stat block inlined. kind/size/faction
        are parsed

        from the ware id and filtered in-process.'
      operationId: list_equipment_api_v1_equipment_get
      parameters:
      - name: kind
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: "engine, shield, weapon, turret, thruster, missile, \u2026"
          title: Kind
        description: "engine, shield, weapon, turret, thruster, missile, \u2026"
      - name: size
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: xs, s, m, l, xl
          title: Size
        description: xs, s, m, l, xl
      - name: faction_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Race/faction code parsed from the ware id, e.g. arg
          title: Faction Id
        description: Race/faction code parsed from the ware id, e.g. arg
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive name substring
          title: Search
        description: Case-insensitive name substring
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 2000
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EquipmentItem'
                title: Response List Equipment Api V1 Equipment Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/equipment/{ware_id}:
    get:
      tags:
      - equipment
      summary: Get Equipment
      description: One ship part with its stat block (engine/shield/weapon) when extracted.
      operationId: get_equipment_api_v1_equipment__ware_id__get
      parameters:
      - name: ware_id
        in: path
        required: true
        schema:
          type: string
          title: Ware Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EquipmentItem'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/faction-relations:
    get:
      tags:
      - factions
      summary: List All Faction Relations
      description: Every faction-to-faction relation from the active save. Returns
        [] until a save is ingested.
      operationId: list_all_faction_relations_api_v1_faction_relations_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/AllFactionRelation'
                type: array
                title: Response List All Faction Relations Api V1 Faction Relations
                  Get
  /api/v1/factions:
    get:
      tags:
      - factions
      summary: List Factions
      description: List all factions in the game catalog.
      operationId: list_factions_api_v1_factions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/FactionSummary'
                type: array
                title: Response List Factions Api V1 Factions Get
  /api/v1/factions/strength:
    get:
      tags:
      - factions
      summary: Faction Strength
      description: "Relative strength metrics, normalized 0-100, computed from LIVE\
        \ save state.\n\nEverything here is the *current* universe (dynamic ships/stations/relations)\
        \ so the\nstandings reflect how the game has actually unfolded \u2014 seed/static\
        \ is init state only\nand is not referenced once a save is loaded. The player\
        \ is ranked alongside AI factions."
      operationId: faction_strength_api_v1_factions_strength_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/FactionStrength'
                type: array
                title: Response Faction Strength Api V1 Factions Strength Get
  /api/v1/factions/known:
    get:
      tags:
      - factions
      summary: List Known Factions
      description: 'Return {faction_id: is_known} for every static faction.'
      operationId: list_known_factions_api_v1_factions_known_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: boolean
                type: object
                title: Response List Known Factions Api V1 Factions Known Get
  /api/v1/factions/{faction_id}:
    get:
      tags:
      - factions
      summary: Get Faction
      description: Get detailed information for a specific faction.
      operationId: get_faction_api_v1_factions__faction_id__get
      parameters:
      - name: faction_id
        in: path
        required: true
        schema:
          type: string
          title: Faction Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactionDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/factions/{faction_id}/relations:
    get:
      tags:
      - factions
      summary: List Faction Relations
      description: Diplomatic relations for a faction from the active save. Returns
        [] until a save is ingested.
      operationId: list_faction_relations_api_v1_factions__faction_id__relations_get
      parameters:
      - name: faction_id
        in: path
        required: true
        schema:
          type: string
          title: Faction Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FactionRelation'
                title: Response List Faction Relations Api V1 Factions  Faction Id  Relations
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/licences:
    get:
      tags:
      - factions
      summary: List Licences
      description: List all faction licences, optionally filtered by faction_id.
      operationId: list_licences_api_v1_licences_get
      parameters:
      - name: faction_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Faction Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FactionLicence'
                title: Response List Licences Api V1 Licences Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/races:
    get:
      tags:
      - races
      summary: List Races
      operationId: list_races_api_v1_races_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/RaceSummary'
                type: array
                title: Response List Races Api V1 Races Get
  /api/v1/races/{race_id}:
    get:
      tags:
      - races
      summary: Get Race
      operationId: get_race_api_v1_races__race_id__get
      parameters:
      - name: race_id
        in: path
        required: true
        schema:
          type: string
          title: Race Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RaceDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/race-relations:
    get:
      tags:
      - races
      summary: List Race Relations
      operationId: list_race_relations_api_v1_race_relations_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/RaceRelation'
                type: array
                title: Response List Race Relations Api V1 Race Relations Get
  /api/v1/map/clusters:
    get:
      tags:
      - map
      summary: List Clusters
      operationId: list_clusters_api_v1_map_clusters_get
      parameters:
      - name: owner_faction
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Owner Faction
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClusterSummary'
                title: Response List Clusters Api V1 Map Clusters Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/sectors:
    get:
      tags:
      - map
      summary: List Sectors
      operationId: list_sectors_api_v1_map_sectors_get
      parameters:
      - name: cluster_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cluster Id
      - name: owner_faction
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Owner Faction
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SectorSummary'
                title: Response List Sectors Api V1 Map Sectors Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/sectors/{sector_id}:
    get:
      tags:
      - map
      summary: Get Sector
      operationId: get_sector_api_v1_map_sectors__sector_id__get
      parameters:
      - name: sector_id
        in: path
        required: true
        schema:
          type: string
          title: Sector Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectorSummary'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/gates:
    get:
      tags:
      - map
      summary: List Gates
      operationId: list_gates_api_v1_map_gates_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 10000
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GateSummary'
                title: Response List Gates Api V1 Map Gates Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/zones:
    get:
      tags:
      - map
      summary: List Zones
      operationId: list_zones_api_v1_map_zones_get
      parameters:
      - name: sector_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Sector Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 10000
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ZoneSummary'
                title: Response List Zones Api V1 Map Zones Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/sectors/{sector_id}/zones:
    get:
      tags:
      - map
      summary: Get Sector Zones
      description: List all zones available in a specific sector.
      operationId: get_sector_zones_api_v1_map_sectors__sector_id__zones_get
      parameters:
      - name: sector_id
        in: path
        required: true
        schema:
          type: string
          title: Sector Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ZoneSummary'
                title: Response Get Sector Zones Api V1 Map Sectors  Sector Id  Zones
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/stations:
    get:
      tags:
      - map
      summary: List Map Stations
      description: 'Stations positioned within their sector, for the zoomed-in map
        view.


        Prefers live save stations; positions fall back live -> static zone centre,
        so

        placement is correct at zone granularity even before per-station offsets are

        parsed. With no save ingested, returns gamestart npc placements (which already

        carry coordinates). `category` is derived from gamestart function tags.'
      operationId: list_map_stations_api_v1_map_stations_get
      parameters:
      - name: sector_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by sector macro id
          title: Sector Id
        description: Filter by sector macro id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 20000
          minimum: 1
          default: 5000
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MapStation'
                title: Response List Map Stations Api V1 Map Stations Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/resources:
    get:
      tags:
      - map
      summary: List Resources
      description: List resource region entries. Filter by ware to find where a resource
        spawns.
      operationId: list_resources_api_v1_map_resources_get
      parameters:
      - name: ware
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by ware (ore, silicon, nividium, hydrogen, helium, methane,
            ice)
          title: Ware
        description: Filter by ware (ore, silicon, nividium, hydrogen, helium, methane,
          ice)
      - name: sector_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by sector macro ID
          title: Sector Id
        description: Filter by sector macro ID
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResourceEntry'
                title: Response List Resources Api V1 Map Resources Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/sectors/{sector_id}/resources:
    get:
      tags:
      - map
      summary: Get Sector Resources
      description: List all resources available in a specific sector.
      operationId: get_sector_resources_api_v1_map_sectors__sector_id__resources_get
      parameters:
      - name: sector_id
        in: path
        required: true
        schema:
          type: string
          title: Sector Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResourceEntry'
                title: Response Get Sector Resources Api V1 Map Sectors  Sector Id  Resources
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/resources/live:
    get:
      tags:
      - map
      summary: List Live Resources
      description: 'Live, depleting mineable resources per sector, from the active
        save.


        Returns [] until a save with resource data is ingested (the dashboard''s mining

        heatmap falls back to the static /map/resources in that case).'
      operationId: list_live_resources_api_v1_map_resources_live_get
      parameters:
      - name: ware
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by ware (ore, silicon, ...)
          title: Ware
        description: Filter by ware (ore, silicon, ...)
      - name: sector_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by sector macro id
          title: Sector Id
        description: Filter by sector macro id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LiveResourceEntry'
                title: Response List Live Resources Api V1 Map Resources Live Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/regions:
    get:
      tags:
      - map
      summary: List Regions
      operationId: list_regions_api_v1_map_regions_get
      parameters:
      - name: cluster_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cluster Id
      - name: sector_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Sector Id
