        Returns [] until a save with resource data is ingested (the dashboard''s mining

        heatmap falls back to the static /map/resources in that case).'
      operationId: list_live_resources_api_v1_map_resources_live_get
      parameters:
      - name: ware
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by ware (ore, silicon, ...)
          title: Ware
        description: Filter by ware (ore, silicon, ...)
      - name: sector_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by sector macro id
          title: Sector Id
        description: Filter by sector macro id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
