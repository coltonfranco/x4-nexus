      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GateSummary'
                title: Response List Gates Api V1 Map Gates Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/zones:
    get:
      tags:
      - map
      summary: List Zones
      operationId: list_zones_api_v1_map_zones_get
      parameters:
      - name: sector_id
