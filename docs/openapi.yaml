openapi: 3.1.0
info:
  title: x4-api
  version: 0.0.1
paths:
  /api/v1/health:
    get:
      tags:
      - health
      summary: Health
      operationId: health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/wares:
    get:
      tags:
      - wares
      summary: List Wares
      operationId: list_wares_api_v1_wares_get
      parameters:
      - name: group
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Group
      - name: transport
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Transport
      - name: category
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filter by computed bucket: commodity, equipment, inventory,
            ship'
          title: Category
        description: 'Filter by computed bucket: commodity, equipment, inventory,
          ship'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WareSummary'
                title: Response List Wares Api V1 Wares Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/wares/{ware_id}:
    get:
      tags:
      - wares
      summary: Get Ware
      operationId: get_ware_api_v1_wares__ware_id__get
      parameters:
      - name: ware_id
        in: path
        required: true
        schema:
          type: string
          title: Ware Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WareDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/equipment:
    get:
      tags:
      - equipment
      summary: List Equipment
      description: 'Every buyable ship part with its stat block inlined. kind/size/faction
        are parsed

        from the ware id and filtered in-process.'
      operationId: list_equipment_api_v1_equipment_get
      parameters:
      - name: kind
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: "engine, shield, weapon, turret, thruster, missile, \u2026"
          title: Kind
        description: "engine, shield, weapon, turret, thruster, missile, \u2026"
      - name: size
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: xs, s, m, l, xl
          title: Size
        description: xs, s, m, l, xl
      - name: faction_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Race/faction code parsed from the ware id, e.g. arg
          title: Faction Id
        description: Race/faction code parsed from the ware id, e.g. arg
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive name substring
          title: Search
        description: Case-insensitive name substring
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 2000
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EquipmentItem'
                title: Response List Equipment Api V1 Equipment Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/equipment/{ware_id}:
    get:
      tags:
      - equipment
      summary: Get Equipment
      description: One ship part with its stat block (engine/shield/weapon) when extracted.
      operationId: get_equipment_api_v1_equipment__ware_id__get
      parameters:
      - name: ware_id
        in: path
        required: true
        schema:
          type: string
          title: Ware Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EquipmentItem'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/faction-relations:
    get:
      tags:
      - factions
      summary: List All Faction Relations
      description: 'Every faction-to-faction relation: gamestart value + current (from
        the active save).


        `current_relation` is NULL until a save is ingested; the same -1..1 scale
        as

        `initial_relation`, so the UI can show drift or COALESCE to the effective
        value.'
      operationId: list_all_faction_relations_api_v1_faction_relations_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/AllFactionRelation'
                type: array
                title: Response List All Faction Relations Api V1 Faction Relations
                  Get
  /api/v1/factions:
    get:
      tags:
      - factions
      summary: List Factions
      description: List all factions in the game catalog.
      operationId: list_factions_api_v1_factions_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/FactionSummary'
                type: array
                title: Response List Factions Api V1 Factions Get
  /api/v1/factions/strength:
    get:
      tags:
      - factions
      summary: Faction Strength
      description: "Relative strength metrics, normalized 0-100, computed from LIVE\
        \ save state.\n\nEverything here is the *current* universe (dynamic ships/stations/relations)\
        \ so the\nstandings reflect how the game has actually unfolded \u2014 seed/static\
        \ is init state only\nand is not referenced once a save is loaded. The player\
        \ is ranked alongside AI factions."
      operationId: faction_strength_api_v1_factions_strength_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/FactionStrength'
                type: array
                title: Response Faction Strength Api V1 Factions Strength Get
  /api/v1/factions/known:
    get:
      tags:
      - factions
      summary: List Known Factions
      description: 'Return {faction_id: is_known} for every static faction.'
      operationId: list_known_factions_api_v1_factions_known_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: boolean
                type: object
                title: Response List Known Factions Api V1 Factions Known Get
  /api/v1/factions/{faction_id}:
    get:
      tags:
      - factions
      summary: Get Faction
      description: Get detailed information for a specific faction.
      operationId: get_faction_api_v1_factions__faction_id__get
      parameters:
      - name: faction_id
        in: path
        required: true
        schema:
          type: string
          title: Faction Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactionDetail'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/factions/{faction_id}/relations:
    get:
      tags:
      - factions
      summary: List Faction Relations
      description: 'Diplomatic relations for a faction: gamestart value + current
        (from active save).'
      operationId: list_faction_relations_api_v1_factions__faction_id__relations_get
      parameters:
      - name: faction_id
        in: path
        required: true
        schema:
          type: string
          title: Faction Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FactionRelation'
                title: Response List Faction Relations Api V1 Factions  Faction Id  Relations
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/licences:
    get:
      tags:
      - factions
      summary: List Licences
      description: List all faction licences, optionally filtered by faction_id.
      operationId: list_licences_api_v1_licences_get
      parameters:
      - name: faction_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Faction Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FactionLicence'
                title: Response List Licences Api V1 Licences Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/races:
