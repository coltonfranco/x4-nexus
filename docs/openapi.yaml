      operationId: list_sectors_api_v1_map_sectors_get
      parameters:
      - name: cluster_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cluster Id
      - name: owner_faction
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Owner Faction
      - name: limit
