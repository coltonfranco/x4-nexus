      operationId: list_loadouts_api_v1_loadouts_get
      parameters:
      - name: ship_macro
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by ship macro ID
          title: Ship Macro
        description: Filter by ship macro ID
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
