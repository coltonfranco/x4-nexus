      operationId: list_modules_api_v1_modules_get
      parameters:
      - name: kind
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filter by kind: production, habitation, storage, dock, defence, connectionmodule'
          title: Kind
        description: 'Filter by kind: production, habitation, storage, dock, defence, connectionmodule'
      - name: limit
        in: query
