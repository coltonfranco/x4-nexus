  /api/v1/map/stations:
    get:
      tags:
      - map
      summary: List Map Stations
      description: 'Stations positioned within their sector, for the zoomed-in map
        view.


        Prefers live save stations; positions fall back live -> static zone centre,
        so

        placement is correct at zone granularity even before per-station offsets are

        parsed. With no save ingested, returns gamestart npc placements (which already

        carry coordinates). `category` is derived from gamestart function tags.'
      operationId: list_map_stations_api_v1_map_stations_get
      parameters:
      - name: sector_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by sector macro id
          title: Sector Id
        description: Filter by sector macro id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 20000
          minimum: 1
          default: 5000
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MapStation'
                title: Response List Map Stations Api V1 Map Stations Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/resources:
    get:
      tags:
      - map
      summary: List Resources
      description: List resource region entries. Filter by ware to find where a resource
        spawns.
      operationId: list_resources_api_v1_map_resources_get
      parameters:
      - name: ware
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by ware (ore, silicon, nividium, hydrogen, helium, methane,
            ice)
          title: Ware
        description: Filter by ware (ore, silicon, nividium, hydrogen, helium, methane,
          ice)
      - name: sector_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by sector macro ID
          title: Sector Id
        description: Filter by sector macro ID
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 500
