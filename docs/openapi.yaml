  /api/v1/npc-stations:
    get:
      tags:
      - npc-stations
      summary: List Npc Stations
      description: List NPC stations in the universe, optionally filtered by owner, tag, or sector.
      operationId: list_npc_stations_api_v1_npc_stations_get
      parameters:
      - name: owner
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by owner faction ID
          title: Owner
        description: Filter by owner faction ID
      - name: tag
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by tag, e.g. shipyard, wharf, equipmentdock
          title: Tag
        description: Filter by tag, e.g. shipyard, wharf, equipmentdock
      - name: sector
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by location_sector (case-insensitive)
          title: Sector
        description: Filter by location_sector (case-insensitive)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NpcStationSummary'
