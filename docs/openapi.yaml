  /api/v1/map/sectors/{sector_id}/zones:
    get:
      tags:
      - map
      summary: Get Sector Zones
      description: List all zones available in a specific sector.
      operationId: get_sector_zones_api_v1_map_sectors__sector_id__zones_get
      parameters:
