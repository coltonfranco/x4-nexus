  /api/v1/map/sector-connections:
    get:
      tags:
      - map
      summary: List Sector Connections
      description: Return all sector-to-sector connections (gate and superhighway, deduplicated).
      operationId: list_sector_connections_api_v1_map_sector_connections_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
