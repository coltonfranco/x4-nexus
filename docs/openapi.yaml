          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SectorSummary'
                title: Response List Sectors Api V1 Map Sectors Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/sectors/{sector_id}:
    get:
      tags:
      - map
      summary: Get Sector
      operationId: get_sector_api_v1_map_sectors__sector_id__get
      parameters:
      - name: sector_id
        in: path
        required: true
        schema:
          type: string
          title: Sector Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SectorSummary'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/map/gates:
    get:
      tags:
      - map
      summary: List Gates
      operationId: list_gates_api_v1_map_gates_get
      parameters:
      - name: limit
        in: query
