<!doctype html>
<!--
  ISOLATED POC — dynamic (save-state) endpoints.

  Self-contained: zero dependencies, zero edits to the TanStack app. Vite serves it at
  /dynamic-poc.html (with the /api proxy) and copies it into dist/ for the API server.
  To revert this POC entirely, delete this one file.

  Demonstrates the save-extraction backend: /saves (+activate), /player (+blueprints,
  +licences), live /stations (+offers), /fleet, and the faction-relation COALESCE.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>X4 Companion — Dynamic POC</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 14px/1.5 system-ui, sans-serif;
    background: #0d1117; color: #c9d1d9; padding: 20px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #8b949e; margin: 0 0 20px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: #8b949e; margin: 0 0 10px; }
  .big { font-size: 26px; font-weight: 600; color: #e6edf3; }
  .row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; border-bottom: 1px solid #21262d; }
  .row:last-child { border-bottom: 0; }
  .muted { color: #8b949e; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 4px 6px; border-bottom: 1px solid #21262d; }
  th { color: #8b949e; font-weight: 500; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .pos { color: #3fb950; } .neg { color: #f85149; }
  select, button { font: inherit; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 10px; }
  button { cursor: pointer; }
  button:hover { background: #30363d; }
  .bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; display: inline-block; }
  .scroll { max-height: 280px; overflow: auto; }
  .err { color: #f85149; font-size: 12px; }
  code { background: #21262d; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
  <h1>X4 Companion — Dynamic POC</h1>
  <p class="sub">Live save-state from <code>/api/v1</code>. Isolated proof-of-concept (single static file).</p>

  <div class="bar">
    <label>Save:</label>
    <select id="saveSelect"></select>
    <button id="activateBtn">Activate &amp; rebuild</button>
    <span class="muted" id="status"></span>
    <span style="margin-left:auto" class="muted"><span class="dot"></span> auto-refresh 5s</span>
  </div>

  <div class="grid">
    <div class="card"><h2>Player</h2><div id="player"></div></div>
    <div class="card"><h2>Holdings</h2><div id="holdings"></div></div>
    <div class="card"><h2>Fleet (player)</h2><div id="fleetSummary"></div></div>
    <div class="card" style="grid-column: 1 / -1"><h2>Top trade routes (cargo 8000, speed 420)</h2><div id="routes" class="scroll"></div></div>
    <div class="card" style="grid-column: 1 / -1"><h2>Player relations — initial vs current</h2><div id="relations"></div></div>
    <div class="card" style="grid-column: 1 / -1"><h2>Live stations</h2><div id="stations" class="scroll"></div></div>
  </div>

<script type="module">
const $ = (id) => document.getElementById(id);
const fmt = (n) => n == null ? "—" : n.toLocaleString();

async function api(path, opts) {
  const r = await fetch(`/api/v1${path}`, opts);
  if (!r.ok) throw Object.assign(new Error(`${r.status}`), { status: r.status });
  return r.json();
}

async function loadSaves() {
  const saves = await api("/saves");
  const sel = $("saveSelect");
  const active = saves.find((s) => s.is_active);
  sel.innerHTML = saves.map((s) =>
    `<option value="${s.key}" ${s.is_active ? "selected" : ""}>${s.save_name ?? s.key}` +
    ` — ${(s.size_bytes/1e6).toFixed(0)}MB ${s.db_current ? "✓" : (s.db_built ? "(stale)" : "(not built)")}</option>`
  ).join("") || `<option>no saves found</option>`;
  return active?.key ?? saves[0]?.key;
}

async function activate() {
  const key = $("saveSelect").value;
  $("status").textContent = "rebuilding…";
  try { await api(`/saves/${key}/activate`, { method: "POST" }); $("status").textContent = "active"; }
  catch (e) { $("status").textContent = `activate failed (${e.status ?? e.message})`; }
  await refresh();
  await loadSaves();
}

async function refresh() {
  // Player account
  try {
    const p = await api("/player");
    $("player").innerHTML =
      `<div class="big">${fmt(p.credits)} cr</div>` +
      `<div class="row"><span class="muted">Name</span><span>${p.name ?? "—"}</span></div>` +
      `<div class="row"><span class="muted">Current ship</span><span>${p.current_ship_id ?? "—"}</span></div>`;
  } catch (e) {
    $("player").innerHTML = `<span class="err">No player data — activate a save (${e.status ?? e.message}).</span>`;
  }

  // Blueprints + licences counts
  try {
    const [bps, lics] = await Promise.all([api("/player/blueprints"), api("/player/licences")]);
    $("holdings").innerHTML =
      `<div class="row"><span class="muted">Blueprints</span><span class="big" style="font-size:20px">${bps.length}</span></div>` +
      `<div class="row"><span class="muted">Licences</span><span class="big" style="font-size:20px">${lics.length}</span></div>`;
  } catch { $("holdings").innerHTML = `<span class="muted">—</span>`; }

  // Fleet
  try {
    const fleet = await api("/fleet?player_only=true&limit=2000");
    const byClass = {};
    for (const s of fleet) byClass[s.class_id ?? "?"] = (byClass[s.class_id ?? "?"] ?? 0) + 1;
    $("fleetSummary").innerHTML =
      `<div class="big">${fleet.length} ships</div>` +
      Object.entries(byClass).sort().map(([c, n]) =>
        `<div class="row"><span class="muted">${c}</span><span>${n}</span></div>`).join("");
  } catch { $("fleetSummary").innerHTML = `<span class="muted">—</span>`; }

  // Top trade routes (the headline economy feature)
  try {
    const routes = await api("/routes?ship_cargo=8000&ship_speed=420&limit=25");
    $("routes").innerHTML = routes.length ? `<table>
      <tr><th>Ware</th><th>Buy sector</th><th>Sell sector</th><th class="num">Margin</th>` +
      `<th class="num">Units</th><th class="num">Profit/trip</th></tr>` +
      routes.map((r) =>
        `<tr><td>${r.ware_name ?? r.ware_id}</td><td class="muted">${r.buy_sector ?? "—"}</td>` +
        `<td class="muted">${r.sell_sector ?? "—"}</td><td class="num pos">${fmt(r.margin)}</td>` +
        `<td class="num">${fmt(r.units_per_trip)}</td>` +
        `<td class="num pos">${fmt(r.profit_per_trip)}</td></tr>`).join("") + `</table>`
      : `<span class="muted">No routes yet — needs station offers from a save.</span>`;
  } catch { $("routes").innerHTML = `<span class="muted">—</span>`; }

  // Faction relations (initial vs current COALESCE)
  try {
    const rels = await api("/factions/player/relations");
    const withCurrent = rels.filter((r) => r.current_relation != null);
    const rows = (withCurrent.length ? withCurrent : rels).slice(0, 30);
    $("relations").innerHTML = rows.length ? `<table>
      <tr><th>Faction</th><th class="num">Initial</th><th class="num">Current</th><th class="num">Δ</th></tr>` +
      rows.map((r) => {
        const cur = r.current_relation, init = r.initial_relation;
        const d = cur == null ? null : (cur - init);
        const cls = d == null ? "" : (d > 0 ? "pos" : d < 0 ? "neg" : "");
        return `<tr><td>${r.other_faction_id}</td>` +
          `<td class="num">${init.toFixed(2)}</td>` +
          `<td class="num">${cur == null ? "—" : cur.toFixed(2)}</td>` +
          `<td class="num ${cls}">${d == null ? "—" : (d > 0 ? "+" : "") + d.toFixed(2)}</td></tr>`;
      }).join("") + `</table>` : `<span class="muted">No relation data.</span>`;
  } catch (e) {
    $("relations").innerHTML = `<span class="muted">No <code>player</code> faction in static.db (${e.status ?? e.message}).</span>`;
  }

  // Live stations
  try {
    const stations = await api("/stations?limit=2000");
    const owners = {};
    for (const s of stations) owners[s.owner_faction ?? "?"] = (owners[s.owner_faction ?? "?"] ?? 0) + 1;
    $("stations").innerHTML = `<div class="muted" style="margin-bottom:8px">${stations.length} stations` +
      ` · ${stations.filter((s) => s.is_player_owned).length} player-owned</div>` + `<table>
      <tr><th>Code</th><th>Owner</th><th>Sector</th><th>Macro</th></tr>` +
      stations.slice(0, 100).map((s) =>
        `<tr><td>${s.code ?? "—"}</td><td>${s.owner_faction ?? "—"}</td>` +
        `<td class="muted">${s.sector_id ?? "—"}</td><td class="muted">${s.macro ?? "—"}</td></tr>`).join("") + `</table>`;
  } catch { $("stations").innerHTML = `<span class="muted">—</span>`; }
}

$("activateBtn").onclick = activate;
$("saveSelect").onchange = () => { $("status").textContent = "press Activate to switch"; };

// Must be served over HTTP so /api hits the API server same-origin. Opening this file
// directly (file://) makes /api resolve to file:///api and the browser blocks it.
if (location.protocol === "file:") {
  $("status").textContent = "";
  document.querySelector(".grid").innerHTML =
    `<div class="card" style="grid-column:1/-1">` +
    `<h2>Open this over HTTP, not as a file</h2>` +
    `<p>You opened a <code>file://</code> URL, so the browser blocks the API calls.</p>` +
    `<p>Run the API server, then open ` +
    `<a style="color:#58a6ff" href="http://127.0.0.1:8765/dynamic-poc.html">http://127.0.0.1:8765/dynamic-poc.html</a>.</p>` +
    `<p class="muted">Dev mode: <code>pnpm dev</code> → ` +
    `<code>http://localhost:5173/dynamic-poc.html</code> (vite proxies <code>/api</code>).</p></div>`;
} else {
  await loadSaves();
  await refresh();
  setInterval(refresh, 5000);
}
</script>
</body>
</html>
