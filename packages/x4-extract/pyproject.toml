[project]
name = "x4-extract"
version = "0.0.1"
description = "Static game data extraction pipeline for X4: Foundations"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "x4-companion contributors" }]
dependencies = [
    "lxml>=5.3",
    "Pillow>=11.0",
    "texture2ddecoder>=0.1; platform_system != 'Darwin'",
    "pydantic-settings>=2.6",
    "watchdog>=6.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/x4_extract"]
