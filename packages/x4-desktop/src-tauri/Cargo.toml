[package]
name = "x4-desktop"
version = "0.0.1"
description = "X4 Nexus desktop shell"
edition = "2021"
rust-version = "1.77"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"

[features]
# Embed the frontend into the binary for `tauri build`; off during `tauri dev`.
custom-protocol = ["tauri/custom-protocol"]
