[package]
name = "x4-desktop"
version = "0.0.0"
description = "X4 Nexus desktop shell"
edition = "2021"
rust-version = "1.77"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# serde/serde_json are referenced by tauri::generate_context! (capability/ACL codegen);
# kept explicit to match the Tauri app template and resolve across tauri 2.x patches.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
# Over-the-air updates: checks GitHub Releases for a newer signed bundle and installs it.
tauri-plugin-updater = "2"
# Lets the frontend relaunch the app after an update is installed.
tauri-plugin-process = "2"

[features]
# Embed the frontend into the binary for `tauri build`; off during `tauri dev`.
custom-protocol = ["tauri/custom-protocol"]
